spring:
  application:
    name: rococo-artist

  grpc:
    server:
      port: 8091
      servlet:
        enabled: false

  datasource:
    url: 'jdbc:mysql://localhost:3306/rococo-artist?createDatabaseIfNotExist=true'
    username: root
    password: secret
    hikari:
      connection-timeout: 20000
      minimum-idle: 10
      maximum-pool-size: 30
      idle-timeout: 10000
      max-lifetime: 1000
      auto-commit: true

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
    open-in-view: false

  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 0
    schemas: rococo-artist
    locations: classpath:db/migration
    validate-on-migrate: true

server:
  port: 8090

logging:
  level:
    guru.qa.rococoartist: DEBUG
    org.springframework.grpc: DEBUG