plugins {
    id 'java'
    id 'io.qameta.allure' version '3.0.0'
    id 'com.apollographql.apollo' version '4.4.1'
    id 'com.github.edeandrea.xjc-generation' version '1.6'
}

group = 'guru.qa'
version = '2.1.4'

repositories {
    mavenCentral()
}

ext {
    junitVersion = '5.13.4'
    allureVersion = '2.30.0'
    selenideVersion = '7.10.1'
    retrofitVersion = '3.0.0'
    okhttp3Version = '5.1.0'
    logbackVersion = '1.5.18'
    slf4jVersion = '2.0.17'
    springJdbcVersion = '6.2.11'
    springCryptoVersion = '6.5.5'
    kafkaClientsVersion = '4.1.0'
    atomicOsVersion = '6.0.0'
    wiremockVersion = '3.13.1'
    fakerVersion = '1.0.2'
    assertjVersion = '3.27.6'
    grpcVersion = '1.68.2'
    protobufVersion = '4.28.2'
    jakartaJaxbVersion = '4.0.5'
    lombokVersion = '1.18.36'
    testcontainersVersion = '1.19.3'
    mysqlConnectorVersion = '8.3.0'
    hikariCpVersion = '5.0.1'
    springBootVersion = '3.4.5'
}

allure {
    version.set("${allureVersion}")
    adapter {
        aspectjVersion.set("1.9.22")
        aspectjWeaver.set(true)
    }
}

dependencies {
    implementation project(':rococo-grpc-common')

    implementation "org.springframework.security:spring-security-crypto:6.5.5"

    // Логи
    implementation "ch.qos.logback:logback-classic:${logbackVersion}"
    implementation "org.slf4j:slf4j-api:${slf4jVersion}"

    // JUnit5
    implementation "org.junit.jupiter:junit-jupiter:${junitVersion}"

    // Jackson
    implementation "com.fasterxml.jackson.core:jackson-annotations:2.15.3"
    implementation "com.fasterxml.jackson.core:jackson-databind:2.15.3"

    // Retrofit + OkHttp
    implementation "com.squareup.okhttp3:logging-interceptor:${okhttp3Version}"
    implementation "com.squareup.okhttp3:okhttp-urlconnection:${okhttp3Version}"
    implementation "com.squareup.okhttp3:okhttp:${okhttp3Version}"
    implementation("com.squareup.retrofit2:retrofit:${retrofitVersion}") {
        exclude group: "com.squareup.okhttp3"
    }
    implementation("com.squareup.retrofit2:converter-jackson:${retrofitVersion}") {
        exclude group: "com.squareup.okhttp3"
    }

    // gRPC
    implementation "io.grpc:grpc-api:${grpcVersion}"
    implementation "io.grpc:grpc-stub:${grpcVersion}"
    implementation "io.grpc:grpc-netty-shaded:${grpcVersion}"
    implementation "com.google.protobuf:protobuf-java:${protobufVersion}"
    implementation "com.google.protobuf:protobuf-java-util:${protobufVersion}"
    compileOnly 'jakarta.annotation:jakarta.annotation-api:1.3.5'

    // Spring JDBC + HikariCP + Testcontainers
    implementation "org.springframework:spring-jdbc:${springJdbcVersion}"
    implementation "com.zaxxer:HikariCP:${hikariCpVersion}"
    implementation "org.springframework.boot:spring-boot-starter-jdbc:${springBootVersion}"
    implementation "com.mysql:mysql-connector-j:${mysqlConnectorVersion}"
    implementation "org.testcontainers:testcontainers:${testcontainersVersion}"
    implementation "org.testcontainers:mysql:${testcontainersVersion}"
    implementation "org.testcontainers:junit-jupiter:${testcontainersVersion}"
    implementation "p6spy:p6spy:3.9.1"

    // Spring Test
    testImplementation "org.springframework:spring-test:${springJdbcVersion}"

    // Allure
    implementation "io.qameta.allure:allure-attachments:${allureVersion}"
    implementation("io.qameta.allure:allure-junit5:${allureVersion}") {
        exclude group: "org.junit.jupiter"
    }
    implementation("io.qameta.allure:allure-selenide:${allureVersion}") {
        exclude group: 'com.codeborne'
    }
    implementation "io.qameta.allure:allure-okhttp3:${allureVersion}"
    implementation "io.qameta.allure:allure-grpc:${allureVersion}"

    // Selenide
    implementation "com.codeborne:selenide:${selenideVersion}"

    // Утилиты
    implementation ("com.github.javafaker:javafaker:${fakerVersion}") {
        exclude group: "org.yaml", module: "snakeyaml"
    }
    implementation "org.yaml:snakeyaml:2.4"
    implementation 'commons-io:commons-io:2.20.0'
    implementation "org.assertj:assertj-core:${assertjVersion}"
    implementation "org.jetbrains:annotations:24.1.0"
    implementation "org.apache.commons:commons-lang3:3.14.0"
    implementation 'com.github.vertical-blank:sql-formatter:2.0.5'

    // Lombok
    annotationProcessor "org.projectlombok:lombok:${lombokVersion}"
    compileOnly "org.projectlombok:lombok:${lombokVersion}"
}

test {
    options {
        systemProperties(System.getProperties())
    }
    useJUnitPlatform()

    maxParallelForks = 1
    forkEvery = 1

    systemProperty("okhttp3.platform", "jdk9")
    systemProperty("java.util.logging.config.file", "src/test/resources/logging.properties")

    testLogging {
        showStandardStreams = false
        exceptionFormat = 'full'
    }
}

sourceSets {
    test {
        resources {
            srcDir "src/test/resources"
        }
    }
}

processTestResources {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}