syntax = "proto3";

import "common.proto";

package rococo.museum;

option java_multiple_files = true;
option java_package = "rococo.grpc.museum";
option java_outer_classname = "MuseumProto";

service MuseumService {
  rpc GetMuseum (MuseumIdRequest) returns (MuseumResponse);
  rpc CreateMuseum (CreateMuseumRequest) returns (MuseumResponse);
  rpc UpdateMuseum (UpdateMuseumRequest) returns (MuseumResponse);
  rpc GetAllMuseums (GetAllMuseumsRequest) returns (MuseumListResponse);
  rpc DeleteMuseum (MuseumIdRequest) returns (Empty);
}

message MuseumIdRequest {
  string id = 1;
}

message CreateMuseumRequest {
  string title = 1;
  string description = 2;
  string city = 3;
  string address = 4;
  optional string photo = 5;
}

message UpdateMuseumRequest {
  string id = 1;
  optional string title = 2;
  optional string description = 3;
  optional string city = 4;
  optional string address = 5;
  optional string photo = 6;
}

message MuseumResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  string city = 4;
  string address = 5;
  optional string photo = 6;
}

message MuseumListResponse {
  repeated MuseumResponse museums = 1;
  int32 totalPages = 2;
  int32 totalElements = 3;
  int32 currentPage = 4;
}

message GetAllMuseumsRequest {
  int32 page = 1;
  int32 size = 2;
  optional string title = 3;
  optional string city = 4;
  optional rococo.common.SortDirection sortDirection = 5;
}

message Empty {}