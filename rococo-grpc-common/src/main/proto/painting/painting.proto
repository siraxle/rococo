syntax = "proto3";

import "common.proto";

package rococo.painting;

option java_multiple_files = true;
option java_package = "rococo.grpc.painting";
option java_outer_classname = "PaintingProto";

service PaintingService {
  rpc GetPainting (PaintingIdRequest) returns (PaintingResponse);
  rpc CreatePainting (CreatePaintingRequest) returns (PaintingResponse);
  rpc UpdatePainting (UpdatePaintingRequest) returns (PaintingResponse);
  rpc GetAllPaintings (GetAllPaintingsRequest) returns (PaintingListResponse);
  rpc DeletePainting (PaintingIdRequest) returns (Empty);
}

message PaintingIdRequest {
  string id = 1;
}

message CreatePaintingRequest {
  string title = 1;
  string description = 2;
  string artist_id = 3;
  optional string museum_id = 4;
  optional string photo = 5;
}

message UpdatePaintingRequest {
  string id = 1;
  optional string title = 2;
  optional string description = 3;
  optional string artist_id = 4;
  optional string museum_id = 5;
  optional string photo = 6;
}

message PaintingResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  string artist_id = 4;
  optional string museum_id = 5;
  optional string photo = 6;
}

message PaintingListResponse {
  repeated PaintingResponse paintings = 1;
  int32 totalPages = 2;
  int32 totalElements = 3;
  int32 currentPage = 4;
}

message GetAllPaintingsRequest {
  int32 page = 1;
  int32 size = 2;
  optional string title = 3;
  optional string artist_id = 4;
  optional string museum_id = 5;
  optional rococo.common.SortDirection sortDirection = 6;
}

message Empty {}