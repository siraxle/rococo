spring:
  autoconfigure:
    exclude:
      - 'org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration'

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:rococo-museum;DB_CLOSE_DELAY=-1;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  jpa:
    generate-ddl: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

  flyway:
    enabled: false

  grpc:
    server:
      port: 0

logging:
  level:
    guru.qa.rococomuseum: DEBUG
    org.springframework.grpc: INFO